version: "3.9"

# ============================================================
# TripAlfa Static Database — PostgreSQL + pgAdmin
# Hosts single-supplier reference data:
#   • LiteAPI  → Hotels static data
#   • Duffel   → Flights static data
#   • OpenExchangeRates → Currency rates
# ============================================================

services:
  # ----------------------------------------------------------
  # PostgreSQL 16 — primary static database
  # ----------------------------------------------------------
  staticdb:
    image: postgres:16-alpine
    container_name: tripalfa-staticdb
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${STATICDB_NAME:-tripalfa_static}
      POSTGRES_USER: ${STATICDB_USER:-staticdb_admin}
      POSTGRES_PASSWORD: ${STATICDB_PASSWORD:?STATICDB_PASSWORD is required}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=en_US.UTF-8 --lc-ctype=en_US.UTF-8"
      TZ: UTC
    ports:
      - "${STATICDB_PORT:-5435}:5432"
    volumes:
      # Schema init scripts — run once on first container start
      - ./schema/001_extensions.sql:/docker-entrypoint-initdb.d/001_extensions.sql:ro
      - ./schema/002_shared_reference.sql:/docker-entrypoint-initdb.d/002_shared_reference.sql:ro
      - ./schema/003_liteapi_hotel_domain.sql:/docker-entrypoint-initdb.d/003_liteapi_hotel_domain.sql:ro
      - ./schema/004_duffel_flight_domain.sql:/docker-entrypoint-initdb.d/004_duffel_flight_domain.sql:ro
      - ./schema/005_indexes.sql:/docker-entrypoint-initdb.d/005_indexes.sql:ro
      - ./schema/006_views.sql:/docker-entrypoint-initdb.d/006_views.sql:ro
      - ./schema/007_postgis_pgvector.sql:/docker-entrypoint-initdb.d/007_postgis_pgvector.sql:ro
      - ./schema/008_liteapi_places_search.sql:/docker-entrypoint-initdb.d/008_liteapi_places_search.sql:ro
      - ./schema/009_materialized_search_indexes.sql:/docker-entrypoint-initdb.d/009_materialized_search_indexes.sql:ro
      - ./schema/010_cross_database_sync.sql:/docker-entrypoint-initdb.d/010_cross_database_sync.sql:ro
      - ./schema/011_liteapi_fallback_cache.sql:/docker-entrypoint-initdb.d/011_liteapi_fallback_cache.sql:ro
      - ./init/00_run_all.sql:/docker-entrypoint-initdb.d/00_run_all.sql:ro
      # Persistent data volume
      - staticdb_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${STATICDB_USER:-staticdb_admin} -d ${STATICDB_NAME:-tripalfa_static}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - staticdb_net

  # ----------------------------------------------------------
  # pgAdmin 4 — Web-based database GUI
  # Access at http://localhost:5051
  # ----------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: tripalfa-staticdb-pgadmin
    restart: unless-stopped
    depends_on:
      staticdb:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@tripalfa.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:?PGADMIN_PASSWORD is required}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "${PGADMIN_PORT:-5051}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    networks:
      - staticdb_net

volumes:
  staticdb_data:
    name: tripalfa_staticdb_data
  pgadmin_data:
    name: tripalfa_staticdb_pgadmin

networks:
  staticdb_net:
    name: tripalfa_staticdb_net
    driver: bridge
