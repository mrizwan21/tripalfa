# ============================================
# TripAlfa Local Development Environment
# ============================================
#
# REQUIRED ENVIRONMENT VARIABLES:
# Create a .env.docker file or export these variables:
#
#   NEON_DATABASE_URL - Neon pooled PostgreSQL connection string (REQUIRED)
#     Example: postgresql://user:pass@ep-xxx.us-east-2.aws.neon.tech/neondb?sslmode=require
#     Get from: https://console.neon.tech/app/projects
#
#   DIRECT_NEON_DATABASE_URL - Neon direct PostgreSQL connection string (OPTIONAL, recommended)
#     Example: postgresql://user:pass@ep-xxx.us-east-2.aws.neon.tech/neondb?sslmode=require
#
#   JWT_SECRET - Secret for JWT token signing (optional, has default for dev)
#     Example: your-secret-key-change-in-production
#
#   DUFFEL_API_KEY - Duffel flight API key (optional, for flight booking)
#   LITEAPI_API_KEY - LiteAPI hotel API key (optional, for hotel booking)
#   KIWI_AFFIL_ID - Kiwi.com affiliate ID (optional, for Kiwi deposit integration)
#   KIWI_API_KEY - Kiwi.com API key (optional, for Kiwi deposit integration)
#
# USAGE:
#   1. Copy .env.local.example to .env.docker
#   2. Fill in your NEON_DATABASE_URL (and DIRECT_NEON_DATABASE_URL if available)
#   3. Run: docker-compose -f docker-compose.local.yml up
#
# VALIDATION:
#   The env-validator service checks for required variables before starting other services.
#   If NEON_DATABASE_URL is not set, the validation will fail with a helpful error message.
#
# NOTE: The local postgres-app container has been removed.
# All services now connect to the Neon cloud database.
# ============================================

services:
  # ============================================
  # Environment Variable Validator
  # ============================================
  # This service validates required environment variables before other services start.
  # It exits with an error if required variables are missing.
  env-validator:
    image: alpine:3.19
    container_name: tripalfa-env-validator
    volumes:
      - ./scripts/validate-env.sh:/validate-env.sh:ro
    entrypoint: ["/bin/sh", "/validate-env.sh"]
    environment:
      NEON_DATABASE_URL: ${NEON_DATABASE_URL:-}
      JWT_SECRET: ${JWT_SECRET:-}
      DUFFEL_API_KEY: ${DUFFEL_API_KEY:-}
      LITEAPI_API_KEY: ${LITEAPI_API_KEY:-}
      KIWI_AFFIL_ID: ${KIWI_AFFIL_ID:-}
      KIWI_API_KEY: ${KIWI_API_KEY:-}

  # ============================================
  # Infrastructure
  # ============================================

  # Static data DB — airports, airlines, hotels, destinations, etc.
  # Data imported via scripts/ and accessed directly by services
  postgres-static:
    image: postgres:15
    container_name: tripalfa-postgres-static
    environment:
      POSTGRES_DB: staticdatabase
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_static_data:/var/lib/postgresql/data
      - ./database/init-static:/docker-entrypoint-initdb.d
    networks:
      - tripalfa-local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tripalfa-redis-local
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tripalfa-local
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Backend Services
  # ============================================

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: tripalfa-api-gateway-local
    ports:
      - "3000:3000"
    depends_on:
      env-validator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      # Use environment variables from .env.docker or shell environment
      # NEVER commit real credentials to version control
      DATABASE_URL: ${NEON_DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_NEON_DATABASE_URL:-${NEON_DATABASE_URL}}
      STATIC_DATABASE_URL: ${STATIC_DATABASE_URL:-postgresql://postgres:postgres@postgres-static:5432/staticdatabase}
      REDIS_URL: redis://redis:6379
      PAYMENT_SERVICE_URL: http://payment-service:3007
      PAYMENT_SERVICE_PORT: 3007
      RULE_ENGINE_SERVICE_URL: http://rule-engine-service:3010
      RULE_ENGINE_SERVICE_PORT: 3010
    networks:
      - tripalfa-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  booking-service:
    build:
      context: .
      dockerfile: services/booking-service/Dockerfile
    container_name: tripalfa-booking-service-local
    ports:
      - "3001:3001"
    depends_on:
      env-validator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: ${NEON_DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_NEON_DATABASE_URL:-${NEON_DATABASE_URL}}
      STATIC_DATABASE_URL: ${STATIC_DATABASE_URL:-postgresql://postgres:postgres@postgres-static:5432/staticdatabase?sslmode=disable}
      JWT_SECRET: ${JWT_SECRET:-test-jwt-secret-key-change-in-production}
    networks:
      - tripalfa-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    container_name: tripalfa-payment-service-local
    ports:
      - "3007:3007"
    environment:
      NODE_ENV: development
      PORT: 3007
      DATABASE_URL: ${NEON_DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_NEON_DATABASE_URL:-${NEON_DATABASE_URL}}
    networks:
      - tripalfa-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3007/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: tripalfa-user-service-local
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: development
      PORT: 3003
      USER_SERVICE_PORT: 3003
      DATABASE_URL: ${NEON_DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_NEON_DATABASE_URL:-${NEON_DATABASE_URL}}
      JWT_SECRET: ${JWT_SECRET:-test-jwt-secret-key-change-in-production}
    networks:
      - tripalfa-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: tripalfa-notification-service-local
    ports:
      - "3009:3009"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3009
      DATABASE_URL: ${NEON_DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_NEON_DATABASE_URL:-${NEON_DATABASE_URL}}
      REDIS_URL: redis://redis:6379
    networks:
      - tripalfa-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3009/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  organization-service:
    build:
      context: .
      dockerfile: services/organization-service/Dockerfile
    container_name: tripalfa-organization-service-local
    ports:
      - "3006:3006"
    environment:
      NODE_ENV: development
      PORT: 3006
      DATABASE_URL: ${NEON_DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_NEON_DATABASE_URL:-${NEON_DATABASE_URL}}
      JWT_SECRET: ${JWT_SECRET:-test-jwt-secret-key-change-in-production}
    networks:
      - tripalfa-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3006/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  rule-engine-service:
    build:
      context: .
      dockerfile: services/rule-engine-service/Dockerfile
    container_name: tripalfa-rule-engine-service-local
    ports:
      - "3010:3010"
    environment:
      NODE_ENV: development
      RULE_ENGINE_SERVICE_PORT: 3010
    networks:
      - tripalfa-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3010/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  kyc-service:
    build:
      context: .
      dockerfile: services/kyc-service/Dockerfile
    container_name: tripalfa-kyc-service-local
    ports:
      - "3011:3011"
    environment:
      NODE_ENV: development
      PORT: 3011
      DATABASE_URL: ${NEON_DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_NEON_DATABASE_URL:-${NEON_DATABASE_URL}}
    networks:
      - tripalfa-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3011/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  marketing-service:
    build:
      context: .
      dockerfile: services/marketing-service/Dockerfile
    container_name: tripalfa-marketing-service-local
    ports:
      - "3012:3012"
    environment:
      NODE_ENV: development
      PORT: 3012
      DATABASE_URL: ${NEON_DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_NEON_DATABASE_URL:-${NEON_DATABASE_URL}}
    networks:
      - tripalfa-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3012/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  wallet-service:
    build:
      context: .
      dockerfile: services/wallet-service/Dockerfile
    container_name: tripalfa-wallet-service-local
    ports:
      - "3008:3008"
    depends_on:
      env-validator:
        condition: service_completed_successfully
    environment:
      NODE_ENV: development
      PORT: 3008
      # JWT_SECRET: REQUIRED - Set this environment variable for production deployments
      # Using empty fallback here to ensure the service fails fast if JWT_SECRET is not set
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: ${NEON_DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_NEON_DATABASE_URL:-${NEON_DATABASE_URL}}
      # Kiwi integration (optional - service will gracefully degrade if not set)
      KIWI_AFFIL_ID: ${KIWI_AFFIL_ID:-}
      KIWI_API_KEY: ${KIWI_API_KEY:-}
      KIWI_WALLET_ID: ${KIWI_WALLET_ID:-}
      KIWI_CURRENCY: ${KIWI_CURRENCY:-EUR}
      KIWI_MIN_BALANCE: ${KIWI_MIN_BALANCE:-1000}
    networks:
      - tripalfa-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3008/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # New Backend Services (B2B Admin & Booking Engine)
  # ============================================

  b2b-admin-service:
    build:
      context: .
      dockerfile: services/b2b-admin-service/Dockerfile
    container_name: tripalfa-b2b-admin-service-local
    ports:
      - "3020:3020"
    environment:
      NODE_ENV: development
      PORT: 3020
      DATABASE_URL: ${NEON_DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_NEON_DATABASE_URL:-${NEON_DATABASE_URL}}
      JWT_SECRET: ${JWT_SECRET:-test-jwt-secret-key-change-in-production}
    networks:
      - tripalfa-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3020/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  booking-engine-service:
    build:
      context: .
      dockerfile: services/booking-engine-service/Dockerfile
    container_name: tripalfa-booking-engine-service-local
    ports:
      - "3021:3021"
    environment:
      NODE_ENV: development
      PORT: 3021
      DATABASE_URL: ${NEON_DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_NEON_DATABASE_URL:-${NEON_DATABASE_URL}}
      JWT_SECRET: ${JWT_SECRET:-test-jwt-secret-key-change-in-production}
      DUFFEL_API_URL: https://api.duffel.com
      DUFFEL_API_KEY: ${DUFFEL_API_KEY:-}
      LITEAPI_BASE_URL: https://api.liteapi.travel
      LITEAPI_API_KEY: ${LITEAPI_API_KEY:-}
    networks:
      - tripalfa-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3021/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Frontend Applications
  # ============================================

  b2b-admin:
    build:
      context: .
      dockerfile: apps/b2b-admin/Dockerfile
    container_name: tripalfa-b2b-admin-local
    ports:
      - "5173:3000"
    environment:
      VITE_API_BASE_URL: http://localhost:3000
    networks:
      - tripalfa-local

  booking-engine:
    build:
      context: .
      dockerfile: apps/booking-engine/Dockerfile
    container_name: tripalfa-booking-engine-local
    ports:
      - "5174:3000"
    environment:
      VITE_API_BASE_URL: http://localhost:3000
    networks:
      - tripalfa-local

volumes:
  postgres_static_data:
  redis_data:

networks:
  tripalfa-local:
    driver: bridge
