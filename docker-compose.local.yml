version: '3.8'

services:
  # ============================================
  # Infrastructure
  # ============================================

  # Static data DB — airports, airlines, hotels, destinations, etc.
  # Data imported via scripts/ and served by static-data-service
  postgres-static:
    image: postgres:15
    container_name: tripalfa-postgres-static
    environment:
      POSTGRES_DB: staticdatabase
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_static_data:/var/lib/postgresql/data
      - ./database/init-static:/docker-entrypoint-initdb.d
    networks:
      - tripalfa-local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Application DB — users, bookings, payments, notifications, etc.
  # Mirrors the Neon production database for local development
  postgres-app:
    image: postgres:15
    container_name: tripalfa-postgres-app
    environment:
      POSTGRES_DB: neondb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_app_data:/var/lib/postgresql/data
    networks:
      - tripalfa-local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tripalfa-redis-local
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tripalfa-local
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Backend Services
  # ============================================

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: tripalfa-api-gateway-local
    ports:
      - "3000:3000"
    depends_on:
      postgres-app:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: "postgresql://postgres:postgres@postgres-app:5432/neondb?schema=public"
      DIRECT_DATABASE_URL: "postgresql://postgres:postgres@postgres-app:5432/neondb?schema=public"
      STATIC_DATABASE_URL: "postgresql://postgres:postgres@postgres-static:5432/staticdatabase"
      REDIS_URL: redis://redis:6379
      PAYMENT_SERVICE_URL: http://payment-service:3007
      PAYMENT_SERVICE_PORT: 3007
      RULE_ENGINE_SERVICE_URL: http://rule-engine-service:3010
      RULE_ENGINE_SERVICE_PORT: 3010
    networks:
      - tripalfa-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  booking-service:
    build:
      context: .
      dockerfile: services/booking-service/Dockerfile
    container_name: tripalfa-booking-service-local
    ports:
      - "3001:3001"
    depends_on:
      postgres-app:
        condition: service_healthy
      postgres-static:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: "postgresql://postgres:postgres@postgres-app:5432/neondb?sslmode=disable"
      STATIC_DATABASE_URL: "postgresql://postgres:postgres@postgres-static:5432/staticdatabase?sslmode=disable"
      JWT_SECRET: test-jwt-secret-key-change-in-production
    networks:
      - tripalfa-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  static-data-service:
    build:
      context: .
      dockerfile: services/static-data-service/Dockerfile
    container_name: tripalfa-static-data-service-local
    ports:
      - "3002:3002"
    depends_on:
      postgres-static:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3002
      STATIC_DATABASE_URL: "postgresql://postgres:postgres@postgres-static:5432/staticdatabase?sslmode=disable"
    networks:
      - tripalfa-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    container_name: tripalfa-payment-service-local
    ports:
      - "3007:3007"
    depends_on:
      postgres-app:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3007
      DATABASE_URL: "postgresql://postgres:postgres@postgres-app:5432/neondb?sslmode=disable"
    networks:
      - tripalfa-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3007/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: tripalfa-user-service-local
    ports:
      - "3004:3004"
    depends_on:
      postgres-app:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3004
      DATABASE_URL: "postgresql://postgres:postgres@postgres-app:5432/neondb?sslmode=disable"
      JWT_SECRET: test-jwt-secret-key-change-in-production
    networks:
      - tripalfa-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: tripalfa-notification-service-local
    ports:
      - "3005:3005"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3005
      REDIS_URL: redis://redis:6379
    networks:
      - tripalfa-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  organization-service:
    build:
      context: .
      dockerfile: services/organization-service/Dockerfile
    container_name: tripalfa-organization-service-local
    ports:
      - "3006:3006"
    depends_on:
      postgres-app:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3006
      DATABASE_URL: "postgresql://postgres:postgres@postgres-app:5432/neondb?sslmode=disable"
      JWT_SECRET: test-jwt-secret-key-change-in-production
    networks:
      - tripalfa-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3006/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  rule-engine-service:
    build:
      context: .
      dockerfile: services/rule-engine-service/Dockerfile
    container_name: tripalfa-rule-engine-service-local
    ports:
      - "3010:3010"
    environment:
      NODE_ENV: development
      RULE_ENGINE_SERVICE_PORT: 3010
    networks:
      - tripalfa-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3010/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  kyc-service:
    build:
      context: .
      dockerfile: services/kyc-service/Dockerfile
    container_name: tripalfa-kyc-service-local
    ports:
      - "3011:3011"
    depends_on:
      postgres-app:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3011
      DATABASE_URL: "postgresql://postgres:postgres@postgres-app:5432/neondb?sslmode=disable"
    networks:
      - tripalfa-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3011/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  marketing-service:
    build:
      context: .
      dockerfile: services/marketing-service/Dockerfile
    container_name: tripalfa-marketing-service-local
    ports:
      - "3012:3012"
    depends_on:
      postgres-app:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3012
      DATABASE_URL: "postgresql://postgres:postgres@postgres-app:5432/neondb?sslmode=disable"
    networks:
      - tripalfa-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3012/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  wallet-service:
    build:
      context: .
      dockerfile: services/wallet-service/Dockerfile
    container_name: tripalfa-wallet-service-local
    ports:
      - "3008:3008"
    depends_on:
      postgres-app:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3008
      DATABASE_URL: "postgresql://postgres:postgres@postgres-app:5432/neondb?sslmode=disable"
    networks:
      - tripalfa-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3008/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Frontend Applications
  # ============================================

  b2b-admin:
    build:
      context: .
      dockerfile: apps/b2b-admin/Dockerfile
    container_name: tripalfa-b2b-admin-local
    ports:
      - "5173:3000"
    environment:
      VITE_API_BASE_URL: http://localhost:3000
    networks:
      - tripalfa-local

  booking-engine:
    build:
      context: .
      dockerfile: apps/booking-engine/Dockerfile
    container_name: tripalfa-booking-engine-local
    ports:
      - "5174:3000"
    environment:
      VITE_API_BASE_URL: http://localhost:3000
    networks:
      - tripalfa-local

volumes:
  postgres_static_data:
  postgres_app_data:
  redis_data:

networks:
  tripalfa-local:
    driver: bridge
