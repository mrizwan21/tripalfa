      retries: 3
    restart: unless-stopped

  # ============================================
  # Rule Engine Service
  # ============================================
  rule-engine-service:
    build:
      context: .
      dockerfile: services/rule-engine-service/Dockerfile
    container_name: tripalfa-rule-engine-service
