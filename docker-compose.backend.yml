# ============================================
# TripAlfa Backend Services Deployment
# ============================================
#
# This docker-compose file deploys the backend services
# and connects them to the existing static database network.
#
# Usage:
#   docker-compose -f docker-compose.backend.yml up -d
#
# ============================================

version: '3.8'

services:
  # ============================================
  # API Gateway
  # ============================================
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: tripalfa-api-gateway
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${NEON_DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_NEON_DATABASE_URL:-${NEON_DATABASE_URL}}
      STATIC_DATABASE_URL: postgresql://postgres:postgres@tripalfa-staticdb:5432/staticdatabase
      JWT_SECRET: ${JWT_SECRET:-test-jwt-secret-key-change-in-production}
    networks:
      - tripalfa_staticdb_net
    depends_on:
      - user-service
      - booking-service
      - payment-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ============================================
  # User Service
  # ============================================
  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: tripalfa-user-service
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${NEON_DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_NEON_DATABASE_URL:-${NEON_DATABASE_URL}}
      JWT_SECRET: ${JWT_SECRET:-test-jwt-secret-key-change-in-production}
    networks:
      - tripalfa_staticdb_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ============================================
  # Payment Service
  # ============================================
  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    container_name: tripalfa-payment-service
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: production
      PORT: 3003
      DATABASE_URL: ${NEON_DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_NEON_DATABASE_URL:-${NEON_DATABASE_URL}}
      JWT_SECRET: ${JWT_SECRET:-test-jwt-secret-key-change-in-production}
    networks:
      - tripalfa_staticdb_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ============================================
  # Booking Service
  # ============================================
  booking-service:
    build:
      context: .
      dockerfile: services/booking-service/Dockerfile
    container_name: tripalfa-booking-service
    ports:
      - "3004:3004"
    environment:
      NODE_ENV: production
      PORT: 3004
      DATABASE_URL: ${NEON_DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_NEON_DATABASE_URL:-${NEON_DATABASE_URL}}
      STATIC_DATABASE_URL: postgresql://postgres:postgres@tripalfa-staticdb:5432/staticdatabase
      JWT_SECRET: ${JWT_SECRET:-test-jwt-secret-key-change-in-production}
    networks:
      - tripalfa_staticdb_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ============================================
  # Notification Service
  # ============================================
  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: tripalfa-notification-service
    ports:
      - "3005:3005"
    environment:
      NODE_ENV: production
      PORT: 3005
      DATABASE_URL: ${NEON_DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_NEON_DATABASE_URL:-${NEON_DATABASE_URL}}
    networks:
      - tripalfa_staticdb_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/health"]
      interval: 30s
