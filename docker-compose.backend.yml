  # ============================================
  # Wallet Service
  # ============================================
  wallet-service:
    build:
      context: .
      dockerfile: services/wallet-service/Dockerfile
    container_name: tripalfa-wallet-service
    ports:
      - "3008:3008"
    environment:
      NODE_ENV: production
      PORT: 3008
      DATABASE_URL: ${NEON_DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_NEON_DATABASE_URL:-${NEON_DATABASE_URL}}
      JWT_SECRET: ${JWT_SECRET}
      KIWI_AFFIL_ID: ${KIWI_AFFIL_ID:-}
      KIWI_API_KEY: ${KIWI_API_KEY:-}
      KIWI_WALLET_ID: ${KIWI_WALLET_ID:-}
      KIWI_CURRENCY: ${KIWI_CURRENCY:-EUR}
      KIWI_MIN_BALANCE: ${KIWI_MIN_BALANCE:-1000}
    networks:
      - tripalfa_staticdb_net
    healthcheck:
