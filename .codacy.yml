# Tool-specific configurations
tools:
  pylint:
    enabled: false
  eslint:
    enabled: true
    config_file: "eslint.config.js"

# Global exclude patterns - applied to all tools
exclude_paths:
  - "**/*.ts"
  - "**/*.tsx"
  - "**/*.js"
  - "**/*.jsx"
  - "**/*.mjs"
  - "**/*.cjs"
  - "**/.vscode/extensions/**/typescript/lib/lib.dom.d.ts"
  - ".vscode/extensions/**/typescript/lib/lib.dom.d.ts"
  - "/Users/*/.vscode/extensions/**/typescript/lib/lib.dom.d.ts"
  - "**/tsconfig.json"
  - "**/tsconfig.*.json"
  - "apps/booking-engine/tsconfig.json"
  - "apps/booking-engine/tsconfig.*.json"
  - "packages/shared-types/tsconfig.json"
  - "tsconfig.json"
  - "**/*.sql"
  - "database/src/generated/prisma/package.json"
  - "**/package.json"
  - "**/vite.config.ts"
  - "**/vite.config.js"
  - "**/*.ts"
  - "**/*.tsx"
  - "apps/b2b-admin/vite.config.ts"
  - "apps/b2b-admin/vite.config.js"
  - "**/.eslintrc.js"
  - "**/.eslintrc.cjs"
  - "**/.eslintrc.mjs"
  - "Dockerfile"
  - "**/Dockerfile"
  - "**/Dockerfile.*"
  - "**/docker-compose*.yml"
  - "**/docker-compose*.yaml"
  - "services/**/Dockerfile"
  - "services/booking-service/Dockerfile"
  - "**/*.sh"
