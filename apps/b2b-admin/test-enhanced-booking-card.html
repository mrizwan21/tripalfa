<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EnhancedBookingCard Test</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .card { border: 1px solid #ccc; padding: 20px; margin: 10px 0; border-radius: 8px; }
    .section { margin: 10px 0; padding: 10px; background: #f9f9f9; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // Mock data for the booking
    const mockBooking = {
      id: 'BK-001',
      status: 'confirmed',
      customer: {
        name: 'John Doe',
        email: 'john@example.com',
        phone: '+1-555-0123'
      },
      supplier: {
        name: 'Airline Corp',
        code: 'AC',
        contact: 'support@airline.com'
      },
      financialSummary: {
        total: 1250.00,
        paid: 1250.00,
        balance: 0.00,
        currency: 'USD'
      },
      details: {
        type: 'flight',
        departure: '2024-01-15',
        return: '2024-01-20',
        passengers: 2
      },
      bookingOptions: {
        insurance: true,
        priority: false
      }
    };

    // Simple component sections
    const CustomerInfo = ({ customer }) => (
      <div className="section">
        <h3>Customer Information</h3>
        <p><strong>Name:</strong> {customer.name}</p>
        <p><strong>Email:</strong> {customer.email}</p>
        <p><strong>Phone:</strong> {customer.phone}</p>
      </div>
    );

    const SupplierInfo = ({ supplier }) => (
      <div className="section">
        <h3>Supplier Information</h3>
        <p><strong>Name:</strong> {supplier.name}</p>
        <p><strong>Code:</strong> {supplier.code}</p>
        <p><strong>Contact:</strong> {supplier.contact}</p>
      </div>
    );

    const FinancialSummary = ({ financial }) => (
      <div className="section">
        <h3>Financial Summary</h3>
        <p><strong>Total:</strong> ${financial.total}</p>
        <p><strong>Paid:</strong> ${financial.paid}</p>
        <p><strong>Balance:</strong> ${financial.balance}</p>
      </div>
    );

    const Overview = ({ details }) => (
      <div className="section">
        <h3>Overview</h3>
        <p><strong>Type:</strong> {details.type}</p>
        <p><strong>Departure:</strong> {details.departure}</p>
        <p><strong>Return:</strong> {details.return}</p>
        <p><strong>Passengers:</strong> {details.passengers}</p>
      </div>
    );

    const Payments = () => (
      <div className="section">
        <h3>Payments</h3>
        <p>Payment history would be displayed here</p>
      </div>
    );

    const Documents = () => (
      <div className="section">
        <h3>Documents</h3>
        <p>Booking documents would be listed here</p>
      </div>
    );

    const History = () => (
      <div className="section">
        <h3>History</h3>
        <p>Booking history would be shown here</p>
      </div>
    );

    // Main component
    const EnhancedBookingCard = ({ booking }) => (
      <div className="card">
        <h2>Booking {booking.id}</h2>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap: '20px' }}>
          <CustomerInfo customer={booking.customer} />
          <SupplierInfo supplier={booking.supplier} />
          <FinancialSummary financial={booking.financialSummary} />
          <Overview details={booking.details} />
          <Payments />
          <Documents />
          <History />
        </div>
      </div>
    );

    // App component
    const App = () => (
      <div>
        <h1>EnhancedBookingCard Test</h1>
        <EnhancedBookingCard booking={mockBooking} />
      </div>
    );

    // Render
    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
