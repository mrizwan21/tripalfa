# Kong Configuration for Booking Service (Hold Orders API)
# Routes all hold orders and payment endpoints through Kong API Manager
# Environment: Development & Staging

version: "1.0"
_format_version: "2.1"

services:
  # Booking Service - Internal API
  - name: booking-service
    url: http://localhost:3007
    protocol: http
    host: localhost
    port: 3007
    path: ""
    retries: 2
    connect_timeout: 5000
    write_timeout: 10000
    read_timeout: 10000
    tags:
      - booking
      - internal
      - hold-orders

routes:
  # ============ HOLD ORDERS - ELIGIBILITY ============
  - name: hold-eligibility
    service: booking-service
    paths:
      - /bookings/hold/eligibility
    strip_path: false
    protocols:
      - http
      - https
    tags:
      - hold-orders
      - eligibility

  # ============ HOLD ORDERS - MANAGEMENT ============
  - name: hold-create-order
    service: booking-service
    paths:
      - /bookings/hold/orders
    methods:
      - POST
    strip_path: false
    protocols:
      - http
      - https
    tags:
      - hold-orders
      - create

  - name: hold-retrieve-order
    service: booking-service
    paths:
      - /bookings/hold/orders
    methods:
      - GET
    strip_path: false
    protocols:
      - http
      - https
    tags:
      - hold-orders
      - retrieve

  - name: hold-cancel-order
    service: booking-service
    paths:
      - /bookings/hold/orders/*/cancel
    methods:
      - POST
    strip_path: false
    protocols:
      - http
      - https
    tags:
      - hold-orders
      - cancel

  # ============ HOLD ORDERS - PRICE & SCHEDULE CHECKS ============
  - name: hold-check-price
    service: booking-service
    paths:
      - /bookings/hold/orders/*/check-price
    methods:
      - POST
    strip_path: false
    protocols:
      - http
      - https
    tags:
      - hold-orders
      - price-check

  - name: hold-check-schedule
    service: booking-service
    paths:
      - /bookings/hold/orders/*/check-schedule
    methods:
      - POST
    strip_path: false
    protocols:
      - http
      - https
    tags:
      - hold-orders
      - schedule-check

  # ============ PAYMENTS ============
  - name: hold-payment
    service: booking-service
    paths:
      - /bookings/hold/orders/*/payment
    methods:
      - POST
    strip_path: false
    protocols:
      - http
      - https
    tags:
      - hold-orders
      - payments

  - name: hold-payment-methods
    service: booking-service
    paths:
      - /bookings/hold/payment-methods
    methods:
      - GET
    strip_path: false
    protocols:
      - http
      - https
    tags:
      - hold-orders
      - payment-methods

  - name: hold-payment-details
    service: booking-service
    paths:
      - /bookings/hold/payments/*
    methods:
      - GET
    strip_path: false
    protocols:
      - http
      - https
    tags:
      - hold-orders
      - payments

  - name: hold-order-payments
    service: booking-service
    paths:
      - /bookings/hold/orders/*/payments
    methods:
      - GET
    strip_path: false
    protocols:
      - http
      - https
    tags:
      - hold-orders
      - payments

  - name: hold-refund-payment
    service: booking-service
    paths:
      - /bookings/hold/payments/*/refund
    methods:
      - POST
    strip_path: false
    protocols:
      - http
      - https
    tags:
      - hold-orders
      - refunds

  # ============ SERVICES (ANCILLARY) ============
  - name: hold-services-list
    service: booking-service
    paths:
      - /bookings/hold/orders/*/services
    methods:
      - GET
    strip_path: false
    protocols:
      - http
      - https
    tags:
      - hold-orders
      - services

  - name: hold-services-add
    service: booking-service
    paths:
      - /bookings/hold/orders/*/services
    methods:
      - POST
    strip_path: false
    protocols:
      - http
      - https
    tags:
      - hold-orders
      - services

  # ============ PAYMENT FINALIZATION & WALLET ============
  - name: payment-finalize
    service: booking-service
    paths:
      - /bookings/payment/finalize
    methods:
      - POST
    strip_path: false
    protocols:
      - http
      - https
    tags:
      - payments
      - finalization

  - name: wallet-topup
    service: booking-service
    paths:
      - /bookings/wallet/topup
    methods:
      - POST
    strip_path: false
    protocols:
      - http
      - https
    tags:
      - wallet
      - topup

  - name: wallet-balance
    service: booking-service
    paths:
      - /bookings/wallet/balance/*
    methods:
      - GET
    strip_path: false
    protocols:
      - http
      - https
    tags:
      - wallet
      - balance

  - name: wallet-transactions
    service: booking-service
    paths:
      - /bookings/wallet/transactions/*
    methods:
      - GET
    strip_path: false
    protocols:
      - http
      - https
    tags:
      - wallet
      - transactions

# Plugins Configuration
plugins:
  - name: rate-limiting
    service: booking-service
    config:
      minute: 2000
      hour: 20000
      policy: local
      fault_tolerant: true

  - name: cors
    service: booking-service
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        - OPTIONS
      headers:
        - Accept
        - Accept-Language
        - Content-Language
        - Content-Type
        - Authorization
        - Duffel-Version
      max_age: 3600
      credentials: true

  - name: request-transformer
    service: booking-service
    config:
      add:
        headers:
          - Content-Type:application/json
          - X-Service:booking-service
          - X-Forwarded-Proto:http

# Upstreams (for load balancing if needed)
upstreams:
  - name: booking-service-upstream
    algorithm: round_robin
    targets:
      - target: localhost:3007
        weight: 100

# Consumer Configuration (if API key auth needed)
consumers:
  - username: api-gateway
    tags:
      - internal
      - api-gateway

consumers_credentials:
  - consumer: api-gateway
    type: key-auth
    tags:
      - internal
