# fallow configuration for TripAlfa monorepo
# https://docs.fallow.tools

entry:
  - 'apps/b2b-portal/index.html'
  - 'apps/b2b-portal/src/main.tsx'
  - 'apps/call-center-portal/index.html'
  - 'apps/call-center-portal/src/main.tsx'
  - 'apps/booking-engine/index.html'
  - 'apps/booking-engine/src/main.tsx'
  - 'apps/super-admin-portal/index.html'
  - 'apps/super-admin-portal/src/main.tsx'
  - 'packages/api-clients/src/index.ts'
  - 'packages/auth-client/src/index.ts'
  - 'packages/booking-engine-service/src/index.ts'
  - 'packages/booking-service/src/index.ts'
  - 'packages/design-tokens/src/index.ts'
  - 'packages/shared-config/src/index.ts'
  - 'packages/shared-database/src/index.ts'
  - 'packages/shared-express/src/index.ts'
  - 'packages/shared-features/src/index.ts'
  - 'packages/shared-openapi/src/index.ts'
  - 'packages/shared-queue/src/index.ts'
  - 'packages/shared-types/src/index.ts'
  - 'packages/shared-utils/src/index.ts'
  - 'packages/shared-validation/src/index.ts'
  - 'packages/static-data/src/index.ts'
  - 'packages/ui-components/src/index.ts'

ignoreRules:
  - 'unlisted-dependency'
  - 'unused-dependency'

ignore:
  # Unlisted dependencies that are inherited from root workspace
  # or not actually used but detected as used
  - '@modelcontextprotocol/sdk'
  - 'pg'
  - 'uuid'
  - 'express'
  - '@prisma/client-runtime-utils'
  - 'redis'
  # These workspace packages are used but not detected correctly
  - '@tripalfa/api-clients'
  - '@tripalfa/shared-utils'
  - '@tripalfa/ui-components'
