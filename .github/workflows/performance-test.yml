name: Performance Benchmarks

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run benchmarks
        run: pnpm --filter @tripalfa/performance-testing run bench

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: packages/performance-testing/benchmark-results/
          retention-days: 30

      - name: Compare with main branch
        if: github.event_name == 'pull_request'
        run: |
          # Download baseline from main
          git fetch origin main:main
          git show origin/main:packages/performance-testing/benchmark-results/baseline.json > /tmp/baseline.json 2>/dev/null || true
          
          # Generate comparison report
          if [ -f /tmp/baseline.json ]; then
            pnpm --filter @tripalfa/performance-testing run report:compare
          fi

      - name: Generate report
        if: always()
        run: pnpm --filter @tripalfa/performance-testing run report

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const reportPath = 'packages/performance-testing/benchmark-results/report.md';
            if (!fs.existsSync(reportPath)) {
              return;
            }
            
            const report = fs.readFileSync(reportPath, 'utf-8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## 📊 Performance Benchmark Results\n\n' + report
            });

      - name: Check for regressions
        run: |
          pnpm --filter @tripalfa/performance-testing run report:strict
        continue-on-error: true

      - name: Store results as baseline (main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          cd packages/performance-testing
          cp benchmark-results/latest.json benchmark-results/baseline.json

      - name: Commit baseline update
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'perf: update performance baseline'
          file_pattern: 'packages/performance-testing/benchmark-results/baseline.json'
          disable_globbing: true
