name: Update Airline Routes

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run airline routes import
        env:
          DATABASE_URL_LOCAL: ${{ secrets.DATABASE_URL_LOCAL }}
        run: pnpm --filter @tripalfa/booking-service exec tsx src/scripts/import-airline-routes.ts

      - name: Commit updated routes timestamp
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Last updated: $(date -u)" > .airline-routes-last-updated
          git add .airline-routes-last-updated
          git commit -m "chore: update airline routes [skip ci]" || echo "No changes to commit"
          git push
