# Complete Duffel API Endpoints Configuration for Kong
# Routes all Duffel API calls through Kong API Manager
# Environment: Development & Staging

services:
  # Main Duffel API Service
  - name: duffel-api-service
    host: api-sandbox.duffel.com # Use sandbox for dev/staging
    port: 443
    protocol: https
    path: /air
    retries: 3
    connect_timeout: 5000
    write_timeout: 15000
    read_timeout: 15000
    enabled: true
    tags:
      - duffel
      - flight-service

routes:
  # ============ FLIGHT SEARCH ============
  - name: duffel-offer-requests
    service: duffel-api-service
    paths:
      - /offer_requests
    methods:
      - POST
    strip_path: false
    protocols:
      - https
    tags:
      - flight-search
      - duffel

  # ============ SEAT MAPS ============
  - name: duffel-seat-maps
    service: duffel-api-service
    paths:
      - /seat_maps
    methods:
      - GET
    strip_path: false
    protocols:
      - https
    tags:
      - ancillary-services
      - seat-maps
      - duffel

  # ============ ANCILLARY SERVICES ============
  - name: duffel-available-services
    service: duffel-api-service
    paths:
      - /orders/*/available_services
    methods:
      - GET
    strip_path: false
    protocols:
      - https
    tags:
      - ancillary-services
      - duffel

  - name: duffel-selected-services
    service: duffel-api-service
    paths:
      - /order_change_requests
    methods:
      - POST
    strip_path: false
    protocols:
      - https
    tags:
      - ancillary-services
      - duffel

  # ============ ORDERS ============
  - name: duffel-orders-create
    service: duffel-api-service
    paths:
      - /orders
    methods:
      - POST
    strip_path: false
    protocols:
      - https
    tags:
      - orders
      - duffel

  - name: duffel-orders-get
    service: duffel-api-service
    paths:
      - /orders
      - /orders/*
    methods:
      - GET
    strip_path: false
    protocols:
      - https
    tags:
      - orders
      - duffel

  - name: duffel-orders-update
    service: duffel-api-service
    paths:
      - /orders/*/documents
      - /orders/*/passengers/*/documents
    methods:
      - POST
      - PATCH
    strip_path: false
    protocols:
      - https
    tags:
      - orders
      - duffel

  # ============ PAYMENTS ============
  - name: duffel-payment-intents
    service: duffel-api-service
    paths:
      - /payment_intents
    methods:
      - GET
      - POST
    strip_path: false
    protocols:
      - https
    tags:
      - payments
      - duffel

  - name: duffel-payment-methods
    service: duffel-api-service
    paths:
      - /payment_methods
    methods:
      - GET
    strip_path: false
    protocols:
      - https
    tags:
      - payments
      - duffel

  # ============ AIRLINES ============
  - name: duffel-airlines
    service: duffel-api-service
    paths:
      - /airlines
    methods:
      - GET
    strip_path: false
    protocols:
      - https
    tags:
      - reference-data
      - duffel

  # ============ AIRCRAFT ============
  - name: duffel-aircraft
    service: duffel-api-service
    paths:
      - /aircraft
    methods:
      - GET
    strip_path: false
    protocols:
      - https
    tags:
      - reference-data
      - duffel

  # ============ AIRPORTS ============
  - name: duffel-airports
    service: duffel-api-service
    paths:
      - /airports
    methods:
      - GET
    strip_path: false
    protocols:
      - https
    tags:
      - reference-data
      - duffel

plugins:
  # ============ AUTHENTICATION ============
  - name: key-auth
    service: duffel-api-service
    config:
      key_names:
        - Authorization
      key_in_header: true
      hide_credentials: true
      anonymous: null

  # ============ RATE LIMITING ============
  - name: rate-limiting
    service: duffel-api-service
    config:
      minute: 1000
      hour: 10000
      policy: local
      fault_tolerant: true
      hide_client_headers: false

  # ============ REQUEST TRANSFORMATION ============
  - name: request-transformer
    service: duffel-api-service
    config:
      add:
        headers:
          - "Duffel-Version:v2"
          - "Content-Type:application/json"
      remove:
        headers:
          - X-Internal-Token

  # ============ CORS ============
  - name: cors
    service: duffel-api-service
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PATCH
        - DELETE
        - OPTIONS
      exposed_headers:
        - X-Duffel-Request-Id
        - X-Duffel-Version
      preflight_continue: false
      max_age: 3600

  # ============ LOGGING ============
  - name: http-log
    service: duffel-api-service
    config:
      http_endpoint: http://logging-service:8000/logs
      method: POST
      timeout: 5000
      queue_size: 100
      flush_timeout: 2

  # ============ RESPONSE CACHING (for reference data) ============
  - name: proxy-cache
    route: duffel-airlines
    config:
      content_type:
        - "application/json"
      cache_ttl: 3600
      response_codes:
        - 200
      request_methods:
        - GET

  - name: proxy-cache
    route: duffel-aircraft
    config:
      content_type:
        - "application/json"
      cache_ttl: 3600
      response_codes:
        - 200
      request_methods:
        - GET

  - name: proxy-cache
    route: duffel-airports
    config:
      content_type:
        - "application/json"
      cache_ttl: 3600
      response_codes:
        - 200
      request_methods:
        - GET
