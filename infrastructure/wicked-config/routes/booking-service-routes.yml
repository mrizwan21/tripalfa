# Plugins Configuration
plugins:
  - name: rate-limiting
    service: booking-service
    config:
      minute: 2000
      hour: 20000
      policy: local
      fault_tolerant: true

  - name: cors
    service: booking-service
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        - OPTIONS
      headers:
        - Accept
        - Accept-Language
        - Content-Language
        - Content-Type
        - Authorization
        - Duffel-Version
      max_age: 3600
      credentials: true

  - name: request-transformer
    service: booking-service
    config:
      add:
        headers:
          - Content-Type:application/json
          - X-Service:booking-service
          - X-Forwarded-Proto:http

# Upstreams (for load balancing if needed)
upstreams:
  - name: booking-service-upstream
    algorithm: round_robin
    targets:
      - target: localhost:3007
        weight: 100

# Consumer Configuration (if API key auth needed)
consumers:
  - username: api-gateway
    tags:
      - internal
      - api-gateway

consumers_credentials:
  - consumer: api-gateway
    type: key-auth
    tags:
      - internal
