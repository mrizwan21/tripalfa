# Kong Configuration for Booking Service (Hold Orders API & LITEAPI)
# Routes all hold orders, payment, and LITEAPI endpoints through Kong API Manager
# Environment: Development & Staging

version: "1.0"
_format_version: "2.1"

services:
  # Booking Service - Internal API
  - name: booking-service
    url: http://localhost:3003
    protocol: http
    host: localhost
    port: 3007
    path: ""
    retries: 2
    connect_timeout: 5000
    write_timeout: 10000
    read_timeout: 10000
    tags:
      - booking
      - internal
      - hold-orders

routes:
  # ============ HOLD ORDERS - ELIGIBILITY ============
  - name: hold-eligibility
    service: booking-service
    paths:
      - /bookings/hold/eligibility
    strip_path: false
    protocols:
      - http
      - https
    tags:
      - hold-orders
      - eligibility

  # ============ HOLD ORDERS - MANAGEMENT ============
  - name: hold-create-order
    service: booking-service
    paths:
      - /bookings/hold/orders
    methods:
      - POST
    strip_path: false
    protocols:
      - http
      - https
    tags:
      - hold-orders
      - create

  - name: hold-retrieve-order
    service: booking-service
    paths:
      - /bookings/hold/orders
    methods:
      - GET
    strip_path: false
    protocols:
      - http
      - https
    tags:
      - hold-orders
      - retrieve

  - name: hold-cancel-order
    service: booking-service
    paths:
      - /bookings/hold/orders/*/cancel
    methods:
      - POST
    strip_path: false
    protocols:
      - http
      - https
    tags:
      - hold-orders
      - cancel

  # ============ HOLD ORDERS - PRICE & SCHEDULE CHECKS ============
