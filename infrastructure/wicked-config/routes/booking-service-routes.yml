      - hold-orders
      - schedule-check

  # ============ PAYMENTS ============
  - name: hold-payment
    service: booking-service
    paths:
      - /bookings/hold/orders/*/payment
    methods:
      - POST
    strip_path: false
    protocols:
      - http
      - https
    tags:
      - hold-orders
      - payments

  - name: hold-payment-methods
    service: booking-service
    paths:
      - /bookings/hold/payment-methods
    methods:
      - GET
    strip_path: false
    protocols:
      - http
      - https
    tags:
      - hold-orders
      - payment-methods

  - name: hold-payment-details
    service: booking-service
    paths:
      - /bookings/hold/payments/*
    methods:
      - GET
    strip_path: false
    protocols:
      - http
      - https
    tags:
      - hold-orders
      - payments

  - name: hold-order-payments
    service: booking-service
    paths:
      - /bookings/hold/orders/*/payments
    methods:
      - GET
    strip_path: false
    protocols:
      - http
      - https
    tags:
      - hold-orders
      - payments

  - name: hold-refund-payment
    service: booking-service
    paths:
      - /bookings/hold/payments/*/refund
    methods:
      - POST
    strip_path: false
