---
name: Hold Orders API Routes
description: Kong routes for Duffel hold orders and payment management
version: 1.0.0

routes:
  # Hold Eligibility Routes
  - name: check-hold-eligibility
    paths:
      - /bookings/hold/eligibility/:offerId
    methods: [GET]
    description: Check if an offer is eligible for hold orders
    strip_path: false
    service: booking-service
    tags:
      - hold-orders
      - eligibility

  # Create Hold Order
  - name: create-hold-order
    paths:
      - /bookings/hold/orders
    methods: [POST]
    description: Create a new hold order for an eligible offer
    strip_path: false
    service: booking-service
    tags:
      - hold-orders
      - create

  # Get Hold Order Details
  - name: get-hold-order
    paths:
      - /bookings/hold/orders/:orderId
    methods: [GET]
    description: Retrieve hold order details
    strip_path: false
    service: booking-service
    tags:
      - hold-orders
      - retrieve

  # Check Price Changes
  - name: check-price-change
    paths:
      - /bookings/hold/orders/:orderId/check-price
    methods: [POST]
    description: Check if price has changed for a hold order
    strip_path: false
    service: booking-service
    tags:
      - hold-orders
      - price-check

  # Check Schedule Changes
  - name: check-schedule-change
    paths:
      - /bookings/hold/orders/:orderId/check-schedule
    methods: [POST]
    description: Check if flight schedule has changed
    strip_path: false
    service: booking-service
    tags:
      - hold-orders
      - schedule-check

  # Payment Processing
  - name: pay-for-hold-order
    paths:
      - /bookings/hold/orders/:orderId/payment
    methods: [POST]
    description: Process payment for hold order
    strip_path: false
    service: booking-service
    tags:
      - hold-orders
      - payments

  # Cancel Hold Order
  - name: cancel-hold-order
    paths:
      - /bookings/hold/orders/:orderId/cancel
    methods: [POST]
    description: Cancel a hold order
    strip_path: false
    service: booking-service
    tags:
      - hold-orders
      - cancel

  # Available Services
  - name: get-hold-services
    paths:
      - /bookings/hold/orders/:orderId/services
    methods: [GET]
    description: List ancillary services for hold order
    strip_path: false
    service: booking-service
    tags:
      - hold-orders
      - services

  - name: add-hold-service
    paths:
      - /bookings/hold/orders/:orderId/services
    methods: [POST]
    description: Add ancillary service to hold order
    strip_path: false
    service: booking-service
    tags:
      - hold-orders
      - services

  # Payment Details
  - name: get-payment-details
    paths:
      - /bookings/hold/payments/:paymentId
    methods: [GET]
    description: Retrieve payment details
    strip_path: false
    service: booking-service
    tags:
      - hold-orders
      - payments

  - name: get-order-payments
    paths:
      - /bookings/hold/orders/:orderId/payments
    methods: [GET]
    description: List all payments for an order
    strip_path: false
    service: booking-service
    tags:
      - hold-orders
      - payments

  # Payment Methods
  - name: get-payment-methods
    paths:
      - /bookings/hold/payment-methods
    methods: [GET]
    description: List available payment methods
    strip_path: false
    service: booking-service
    tags:
      - hold-orders
      - payment-methods

  # Refund Processing
  - name: refund-payment
    paths:
      - /bookings/hold/payments/:paymentId/refund
    methods: [POST]
    description: Refund a completed payment
    strip_path: false
    service: booking-service
    tags:
      - hold-orders
      - refunds

# Plugins configuration
plugins:
  - name: rate-limiting
    enabled: true
    config:
      minute: 2000
      policy: local

  - name: cors
    enabled: true
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        - OPTIONS

  - name: request-transformer
    enabled: true
    config:
      add:
        headers:
          - Authorization:Bearer $(DUFFEL_API_KEY)
          - Duffel-Version:v2
          - Content-Type:application/json
