version: '3.8'

services:
  # Core Infrastructure (already in main docker-compose, but defining here for isolated run)
  postgres-static:
    image: postgres:15
    environment:
      POSTGRES_DB: staticdatabase
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_static_data:/var/lib/postgresql/data

  redis-cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_hybrid_data:/data

  # Hybrid Architecture Services
  api-gateway:
    build:
      context: ../../services/api-gateway
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=${DATABASE_URL}
      - STATIC_DATABASE_URL=postgresql://postgres:postgres@postgres-static:5432/staticdatabase
      - REDIS_URL=redis://redis-cache:6379
      - API_GATEWAY_PORT=3000
    depends_on:
      - postgres-static
      - redis-cache

  ingest-worker:
    build:
      context: ../../services/ingest
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis-cache:6379
      - INGEST_STREAM=ingest:stream
    depends_on:
      - redis-cache

  metrics-service:
    build:
      context: ../../services/metrics
    ports:
      - "3010:3010"
    environment:
      - PORT=3010
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - postgres-static

volumes:
  postgres_static_data:
  redis_hybrid_data:
