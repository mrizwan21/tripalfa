plugins:
  -
    name: "cors"
    config:
      origins:
        - "*"
      methods:
        - "GET"
        - "POST"
        - "PUT"
        - "PATCH"
        - "DELETE"
        - "OPTIONS"
      headers:
        - "Authorization"
        - "Content-Type"
        - "X-Requested-With"
        - "x-sales-channel"
        - "x-tenant-id"
      exposed_headers:
        - "X-Request-Id"
      credentials: true
      max_age: 3600
  -
    name: "rate-limiting"
    config:
      minute: 12000
      policy: "local"
    service:
      name: "booking-engine-service"
  -
    name: "rate-limiting"
    config:
      minute: 12000
      policy: "local"
    service:
      name: "booking-service"
  -
    name: "rate-limiting"
    config:
      minute: 6000
      policy: "local"
    service:
      name: "external-duffel"
  -
    name: "rate-limiting"
    config:
      minute: 6000
      policy: "local"
    service:
      name: "external-liteapi"
