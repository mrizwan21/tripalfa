_format_version: "3.0"
_transform: true
services:
  -
    name: "booking-engine-service"
    protocol: "http"
    host: "localhost"
    port: 3021
    path: "/"
    retries: 2
    connect_timeout: 6000
    write_timeout: 15000
    read_timeout: 15000
    tags:
      - "internal"
      - "booking-engine"
      - "frontend"
  -
    name: "booking-service"
    protocol: "http"
    host: "localhost"
    port: 3001
    path: "/"
    retries: 2
    connect_timeout: 6000
    write_timeout: 15000
    read_timeout: 15000
    tags:
      - "internal"
      - "booking"
