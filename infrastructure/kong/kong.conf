# TripAlfa local Kong runtime (DB-less)
database = off

# Network
proxy_listen = 0.0.0.0:3030 reuseport
admin_listen = 127.0.0.1:8001 reuseport

# Runtime paths
prefix = ./infrastructure/kong/.runtime
declarative_config = ./infrastructure/kong/kong.yml

# Logging
log_level = notice
proxy_access_log = ./infrastructure/kong/.runtime/logs/proxy_access.log
proxy_error_log = ./infrastructure/kong/.runtime/logs/proxy_error.log
admin_access_log = ./infrastructure/kong/.runtime/logs/admin_access.log
admin_error_log = ./infrastructure/kong/.runtime/logs/admin_error.log
