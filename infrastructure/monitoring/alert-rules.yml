groups:
  - name: tripalfa.rules
    interval: 30s
    rules:
      # Service Availability Alerts
      - alert: ServiceDown
        expr: up{job="tripalfa"} == 0
        for: 1m
        labels:
          severity: critical
          team: ops
        annotations:
          summary: "{{ $labels.instance }} service is down"
          description: "Service {{ $labels.instance }} has been down for more than 1 minute"

      - alert: APIGatewayDown
        expr: up{job="api-gateway"} == 0
        for: 1m
        labels:
          severity: critical
          team: ops
        annotations:
          summary: "API Gateway is down"
          description: "API Gateway service is unavailable. Immediate action required!"

      - alert: BookingServiceDown
        expr: up{job="booking-service"} == 0
        for: 1m
        labels:
          severity: critical
          team: ops
        annotations:
          summary: "Booking Service is down"
          description: "Booking Service is unavailable. Users cannot make bookings!"

      # Error Rate Alerts
      - alert: HighErrorRate
        expr: |
          (sum(rate(http_requests_total{status=~"5.."}[5m])) by (job) /
           sum(rate(http_requests_total[5m])) by (job)) > 0.05
        for: 5m
        labels:
          severity: warning
          team: dev
        annotations:
          summary: "High error rate for {{ $labels.job }}"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%)"

      - alert: CriticalErrorRate
        expr: |
          (sum(rate(http_requests_total{status=~"5.."}[5m])) by (job) /
           sum(rate(http_requests_total[5m])) by (job)) > 0.10
        for: 2m
        labels:
          severity: critical
          team: dev
        annotations:
          summary: "Critical error rate for {{ $labels.job }}"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 10%)"

      # Response Time Alerts
      - alert: HighResponseTime
        expr: |
          histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
          team: dev
        annotations:
          summary: "High response time for {{ $labels.handler }}"
          description: "p95 response time is {{ $value | humanizeDuration }}"

      - alert: VeryHighResponseTime
        expr: |
          histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 5
        for: 2m
        labels:
          severity: critical
          team: dev
        annotations:
          summary: "Very high response time for {{ $labels.handler }}"
          description: "p99 response time is {{ $value | humanizeDuration }}"

      # Database Alerts
      - alert: DatabaseDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
          team: database
        annotations:
          summary: "Database is down"
          description: "PostgreSQL database is not responding"

      - alert: HighDatabaseConnections
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
          team: database
        annotations:
          summary: "High number of database connections"
          description: "Database has {{ $value }} connections (threshold: 80)"

      - alert: MaxDatabaseConnections
        expr: pg_stat_activity_count > 95
        for: 1m
        labels:
          severity: critical
          team: database
        annotations:
          summary: "Database connection pool nearly full"
          description: "{{ $value }} connections out of 100 max. Queries may be blocked!"

      - alert: SlowDatabaseQueries
        expr: |
          avg(pg_slow_queries) > 10
        for: 5m
        labels:
          severity: warning
          team: database
        annotations:
          summary: "High number of slow database queries"
          description: "{{ $value | humanize }} slow queries detected"

      - alert: DatabaseStorageHigh
        expr: |
          (pg_database_size_bytes / 107374182400) > 0.8
        for: 10m
        labels:
          severity: warning
          team: database
        annotations:
          summary: "Database storage is over 80%"
          description: "Database storage is {{ $value | humanizePercentage }} full"

      # Resource Alerts
      - alert: HighMemoryUsage
        expr: |
          (container_memory_usage_bytes / container_spec_memory_limit_bytes) * 100 > 85
        for: 5m
        labels:
          severity: warning
          team: ops
        annotations:
          summary: "High memory usage on {{ $labels.pod_name }}"
          description: "Memory usage is {{ $value | humanize }}%"

      - alert: CriticalMemoryUsage
        expr: |
          (container_memory_usage_bytes / container_spec_memory_limit_bytes) * 100 > 95
        for: 2m
        labels:
          severity: critical
          team: ops
        annotations:
          summary: "Critical memory usage on {{ $labels.pod_name }}"
          description: "Memory usage is {{ $value | humanize }}%. Pod may be OOMKilled!"

      - alert: HighCPUUsage
        expr: |
          (rate(container_cpu_usage_seconds_total[5m]) * 100) > 80
        for: 5m
        labels:
          severity: warning
          team: ops
        annotations:
          summary: "High CPU usage on {{ $labels.pod_name }}"
          description: "CPU usage is {{ $value | humanize }}%"

      - alert: CriticalCPUUsage
        expr: |
          (rate(container_cpu_usage_seconds_total[5m]) * 100) > 95
        for: 2m
        labels:
          severity: critical
          team: ops
        annotations:
          summary: "Critical CPU usage on {{ $labels.pod_name }}"
          description: "CPU usage is {{ $value | humanize }}%"

      # Disk Alerts
      - alert: LowDiskSpace
        expr: |
          ((node_filesystem_avail_bytes / node_filesystem_size_bytes) * 100) < 20
        for: 5m
        labels:
          severity: warning
          team: ops
        annotations:
          summary: "Low disk space on {{ $labels.device }}"
          description: "{{ $value | humanize }}% disk space remaining"

      - alert: CriticalDiskSpace
        expr: |
          ((node_filesystem_avail_bytes / node_filesystem_size_bytes) * 100) < 10
        for: 2m
        labels:
          severity: critical
          team: ops
        annotations:
          summary: "Critical disk space on {{ $labels.device }}"
          description: "Only {{ $value | humanize }}% disk space remaining. Urgent action needed!"

      # Deployment Health
      - alert: PodCrashLooping
        expr: |
          rate(kube_pod_container_status_restarts_total[15m]) > 0.1
        for: 5m
        labels:
          severity: critical
          team: ops
        annotations:
          summary: "Pod {{ $labels.pod }} is crash looping"
          description: "{{ $labels.pod }} has restarted {{ $value | humanize }} times in the last 15 minutes"

      - alert: PodNotReady
        expr: |
          sum by (pod) (kube_pod_status_phase{phase=~"Pending|Unknown|Failed"}) > 0
        for: 5m
        labels:
          severity: warning
          team: ops
        annotations:
          summary: "Pod {{ $labels.pod }} is not ready"
          description: "Pod has been {{ $labels.phase | lower }} for more than 5 minutes"

      # Queue/Message Broker Alerts
      - alert: HighQueueDepth
        expr: |
          queue_depth > 1000
        for: 5m
        labels:
          severity: warning
          team: ops
        annotations:
          summary: "High message queue depth"
          description: "Queue {{ $labels.queue }} has {{ $value | humanize }} messages"

      - alert: CriticalQueueDepth
        expr: |
          queue_depth > 10000
        for: 2m
        labels:
          severity: critical
          team: ops
        annotations:
          summary: "Critical message queue depth"
          description: "Queue {{ $labels.queue }} has {{ $value | humanize }} messages. Consumers may be stuck!"

      # Custom Business Logic Alerts
      - alert: BookingFailureRate
        expr: |
          (sum(rate(bookings_failed_total[5m])) /
           sum(rate(bookings_total[5m]))) > 0.01
        for: 5m
        labels:
          severity: warning
          team: product
        annotations:
          summary: "High booking failure rate"
          description: "{{ $value | humanizePercentage }} of bookings are failing"

      - alert: PaymentProcessingDelay
        expr: |
          payment_processing_duration_seconds > 30
        for: 5m
        labels:
          severity: warning
          team: payment
        annotations:
          summary: "Payment processing delayed"
          description: "Payment processing taking {{ $value | humanizeDuration }}"
