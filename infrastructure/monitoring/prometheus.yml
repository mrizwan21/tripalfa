# Local development configuration for Prometheus
# Use prometheus.docker.yml for Docker Compose and Kubernetes deployments

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "tripalfa-monitor"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # API Gateway
  - job_name: "api-gateway"
    static_configs:
      - targets: ["localhost:3000"]
    metrics_path: /metrics

  # Booking Service
  - job_name: "booking-service"
    static_configs:
      - targets: ["localhost:3001"]
    metrics_path: /metrics

  # Payment Service
  - job_name: "payment-service"
    static_configs:
      - targets: ["localhost:3007"]
    metrics_path: /metrics

  # User Service
  - job_name: "user-service"
    static_configs:
      - targets: ["localhost:3004"]
    metrics_path: /metrics

  # Notification Service
  - job_name: "notification-service"
    static_configs:
      - targets: ["localhost:3009"]
    metrics_path: /metrics

  # Organization Service
  - job_name: "organization-service"
    static_configs:
      - targets: ["localhost:3006"]
    metrics_path: /metrics

  # Rule Engine Service
  - job_name: "rule-engine-service"
    static_configs:
      - targets: ["localhost:3010"]
    metrics_path: /metrics

  # Wallet Service
  - job_name: "wallet-service"
    static_configs:
      - targets: ["localhost:3008"]
    metrics_path: /metrics

  # KYC Service
  - job_name: "kyc-service"
    static_configs:
      - targets: ["localhost:3011"]
    metrics_path: /metrics

  # Marketing Service
  - job_name: "marketing-service"
    static_configs:
      - targets: ["localhost:3012"]
    metrics_path: /metrics

  # B2B Portal Service
  - job_name: "b2b-portal-service"
    static_configs:
      - targets: ["localhost:3020"]
    metrics_path: /metrics

  # Booking Engine Service
  - job_name: "booking-engine-service"
    static_configs:
      - targets: ["localhost:3021"]
    metrics_path: /metrics

  # RabbitMQ (if running locally)
  - job_name: "rabbitmq"
    static_configs:
      - targets: ["localhost:15692"]

  # Redis Exporter (if running locally)
  - job_name: "redis"
    static_configs:
      - targets: ["localhost:6379"]

  # PostgreSQL Exporter (if added)
  - job_name: "postgres"
    static_configs:
      - targets: ["localhost:5432"]
