; Grafana Configuration for Local Development
; Customized for running Grafana locally without Docker

[paths]
data = ./data
logs = ./logs
plugins = ./plugins

[server]
http_port = 3500
domain = localhost
enforce_domain = false
root_url = http://localhost:3500
serve_from_sub_path = false

[database]
type = sqlite3
path = ./data/grafana.db

[auth]
; Disable authentication for local development
disable_login_form = false
disable_signout_menu = false

[auth.anonymous]
; Enable anonymous access for testing
enabled = true
org_role = Viewer

[users]
allow_sign_up = true

[security]
admin_user = admin
admin_password = admin

[install]
; Auto-provision dashboards and datasources
provisioning_path = /Users/mohamedrizwan/Desktop/TripAlfa\ -\ Node/infrastructure/monitoring/grafana/provisioning

[metrics]
enabled = true
interval_seconds = 10
