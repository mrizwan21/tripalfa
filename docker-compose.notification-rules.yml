version: '3.8'

# Docker Compose for Notification & Rule Engine Services (Local Development)
# Run with: docker-compose -f docker-compose.notification-rules.yml up

services:
  # Notification Service
  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: tripalfa-notification-service-local
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      DATABASE_URL: ${NEON_DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_NEON_DATABASE_URL:-${NEON_DATABASE_URL}}
      NOTIFICATION_SERVICE_PORT: 3001
      LOG_LEVEL: debug
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tripalfa-notif-rules-network
    volumes:
      - ./services/notification-service/src:/app/src
      - /app/node_modules

  # Rule Engine Service
  rule-engine-service:
    build:
      context: .
      dockerfile: services/rule-engine-service/Dockerfile
    container_name: tripalfa-rule-engine-service-local
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: development
      DATABASE_URL: ${NEON_DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_NEON_DATABASE_URL:-${NEON_DATABASE_URL}}
      RULE_ENGINE_SERVICE_PORT: 3002
      LOG_LEVEL: debug
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tripalfa-notif-rules-network
    volumes:
      - ./services/rule-engine-service/src:/app/src
      - /app/node_modules

networks:
  tripalfa-notif-rules-network:
    driver: bridge
