#
# TripAlfa Resilient Microservices Architecture
#
# This configuration implements fault-tolerant microservices with:
# - Circuit Breaker Pattern
# - Service Discovery & Health Checks
# - Message Queue (RabbitMQ) for async communication
# - Centralized Monitoring (Prometheus, Grafana, Loki)
# - Automatic Failover
#

services:
  # ============================================
  # INFRASTRUCTURE - Message Queue
  # ============================================

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: tripalfa-rabbitmq
    ports:
      - "5672:5672" # AMQP
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: tripalfa
      RABBITMQ_DEFAULT_PASS: tripalfa123
      RABBITMQ_DEFAULT_VHOST: tripalfa
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - tripalfa-resilient
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ============================================
  # INFRASTRUCTURE - Monitoring
  # ============================================

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: tripalfa-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    networks:
      - tripalfa-resilient
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.2
    container_name: tripalfa-grafana
    ports:
      - "3009:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: false
      GF_ALERTING_ENABLED: false
      GF_UNIFIED_ALERTING_ENABLED: true
    volumes:
      - ./infrastructure/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - tripalfa-resilient
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.3
    container_name: tripalfa-loki
    ports:
      - "3100:3100"
    volumes:
      - ./infrastructure/monitoring/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - tripalfa-resilient
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.3
    container_name: tripalfa-promtail
    volumes:
      - ./infrastructure/monitoring/promtail.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - ./logs:/app/logs:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - tripalfa-resilient
    restart: unless-stopped

  # ============================================
  # INFRASTRUCTURE - Service Discovery
  # ============================================

  consul:
    image: consul:1.15
    container_name: tripalfa-consul
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    command: agent -server -ui -bootstrap-expect=1 -client=0.0.0.0
    volumes:
      - consul_data:/consul/data
    networks:
      - tripalfa-resilient
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ============================================
  # INFRASTRUCTURE - Databases
  # ============================================

  postgres-static:
    image: postgres:15
    container_name: tripalfa-postgres-static
    environment:
      POSTGRES_DB: staticdatabase
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_static_data:/var/lib/postgresql/data
      - ./database/init-static:/docker-entrypoint-initdb.d
    networks:
      - tripalfa-resilient
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: tripalfa-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - tripalfa-resilient
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================
  # CORE SERVICES - API Gateway
  # ============================================

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: tripalfa-api-gateway
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      consul:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${NEON_DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_NEON_DATABASE_URL:-${NEON_DATABASE_URL}}
      STATIC_DATABASE_URL: "postgresql://postgres:postgres@postgres-static:5432/staticdatabase"
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://tripalfa:tripalfa123@rabbitmq:5672/tripalfa
      CONSUL_HOST: consul
      CONSUL_PORT: 8500

      # Service URLs with DNS discovery fallback
      PAYMENT_SERVICE_URL: http://payment-service:3007
      RULE_ENGINE_SERVICE_URL: http://rule-engine-service:3010
      BOOKING_SERVICE_URL: http://booking-service:3001
      USER_SERVICE_URL: http://user-service:3004
      NOTIFICATION_SERVICE_URL: http://notification-service:3009
      ORGANIZATION_SERVICE_URL: http://organization-service:3006
      B2B_ADMIN_SERVICE_URL: http://b2b-admin-service:3020
      BOOKING_ENGINE_SERVICE_URL: http://booking-engine-service:3021

      # Circuit Breaker Settings
      CIRCUIT_BREAKER_FAILURE_THRESHOLD: 5
      CIRCUIT_BREAKER_SUCCESS_THRESHOLD: 3
      CIRCUIT_BREAKER_TIMEOUT: 30000

      # Resilience Settings
      ENABLE_CIRCUIT_BREAKER: "true"
      ENABLE_HEALTH_CHECKS: "true"
      ENABLE_SERVICE_REGISTRY: "true"

    networks:
      - tripalfa-resilient
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ============================================
  # CORE SERVICES - Booking Service
  # ============================================

  booking-service:
    build:
      context: .
      dockerfile: services/booking-service/Dockerfile
    container_name: tripalfa-booking-service
    ports:
      - "3011:3001"
    depends_on:
      postgres-static:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${NEON_DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_NEON_DATABASE_URL:-${NEON_DATABASE_URL}}
      STATIC_DATABASE_URL: "postgresql://postgres:postgres@postgres-static:5432/staticdatabase?sslmode=disable"
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://tripalfa:tripalfa123@rabbitmq:5672/tripalfa
      JWT_SECRET: ${JWT_SECRET:-change-in-production}

      # Resilience
      ENABLE_CIRCUIT_BREAKER: "true"
      CIRCUIT_BREAKER_FAILURE_THRESHOLD: 5
      CIRCUIT_BREAKER_TIMEOUT: 30000

    networks:
      - tripalfa-resilient
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M

  # ============================================
  # CORE SERVICES - Payment Service
  # ============================================

  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    container_name: tripalfa-payment-service
    ports:
      - "3007:3007"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3007
      DATABASE_URL: ${NEON_DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_NEON_DATABASE_URL:-${NEON_DATABASE_URL}}
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://tripalfa:tripalfa123@rabbitmq:5672/tripalfa
      JWT_SECRET: ${JWT_SECRET:-change-in-production}

      # Resilience
      ENABLE_CIRCUIT_BREAKER: "true"
    networks:
      - tripalfa-resilient
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3007/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M

  # ============================================
  # CORE SERVICES - User Service
  # ============================================

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: tripalfa-user-service
    ports:
      - "3004:3004"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3004
      DATABASE_URL: ${NEON_DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_NEON_DATABASE_URL:-${NEON_DATABASE_URL}}
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://tripalfa:tripalfa123@rabbitmq:5672/tripalfa
      JWT_SECRET: ${JWT_SECRET:-change-in-production}
    networks:
      - tripalfa-resilient
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ============================================
  # CORE SERVICES - Notification Service
  # ============================================

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: tripalfa-notification-service
    ports:
      - "3009:3009"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3009
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://tripalfa:tripalfa123@rabbitmq:5672/tripalfa
    networks:
      - tripalfa-resilient
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3009/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ============================================
  # CORE SERVICES - Organization Service
  # ============================================

  organization-service:
    build:
      context: .
      dockerfile: services/organization-service/Dockerfile
    container_name: tripalfa-organization-service
    ports:
      - "3006:3006"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3006
      DATABASE_URL: ${NEON_DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_NEON_DATABASE_URL:-${NEON_DATABASE_URL}}
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://tripalfa:tripalfa123@rabbitmq:5672/tripalfa
      JWT_SECRET: ${JWT_SECRET:-change-in-production}
    networks:
      - tripalfa-resilient
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ============================================
  # CORE SERVICES - Rule Engine Service
  # ============================================

  rule-engine-service:
    build:
      context: .
      dockerfile: services/rule-engine-service/Dockerfile
    container_name: tripalfa-rule-engine-service
    ports:
      - "3010:3010"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      NODE_ENV: production
      RULE_ENGINE_SERVICE_PORT: 3010
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://tripalfa:tripalfa123@rabbitmq:5672/tripalfa
    networks:
      - tripalfa-resilient
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ============================================
  # CORE SERVICES - Wallet Service
  # ============================================

  wallet-service:
    build:
      context: .
      dockerfile: services/wallet-service/Dockerfile
    container_name: tripalfa-wallet-service
    ports:
      - "3008:3008"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3008
      DATABASE_URL: ${NEON_DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_NEON_DATABASE_URL:-${NEON_DATABASE_URL}}
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://tripalfa:tripalfa123@rabbitmq:5672/tripalfa
      JWT_SECRET: ${JWT_SECRET:-change-in-production}
    networks:
      - tripalfa-resilient
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3008/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ============================================
  # CORE SERVICES - KYC Service
  # ============================================

  kyc-service:
    build:
      context: .
      dockerfile: services/kyc-service/Dockerfile
    container_name: tripalfa-kyc-service
    ports:
      - "3011:3011"
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3011
      DATABASE_URL: ${NEON_DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_NEON_DATABASE_URL:-${NEON_DATABASE_URL}}
      RABBITMQ_URL: amqp://tripalfa:tripalfa123@rabbitmq:5672/tripalfa
    networks:
      - tripalfa-resilient
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3011/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ============================================
  # CORE SERVICES - Marketing Service
  # ============================================

  marketing-service:
    build:
      context: .
      dockerfile: services/marketing-service/Dockerfile
    container_name: tripalfa-marketing-service
    ports:
      - "3012:3012"
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3012
      DATABASE_URL: ${NEON_DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_NEON_DATABASE_URL:-${NEON_DATABASE_URL}}
      RABBITMQ_URL: amqp://tripalfa:tripalfa123@rabbitmq:5672/tripalfa
    networks:
      - tripalfa-resilient
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3012/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ============================================
  # CORE SERVICES - B2B Admin Service
  # ============================================

  b2b-admin-service:
    build:
      context: .
      dockerfile: services/b2b-admin-service/Dockerfile
    container_name: tripalfa-b2b-admin-service
    ports:
      - "3020:3020"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3020
      DATABASE_URL: ${NEON_DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_NEON_DATABASE_URL:-${NEON_DATABASE_URL}}
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://tripalfa:tripalfa123@rabbitmq:5672/tripalfa
      JWT_SECRET: ${JWT_SECRET:-change-in-production}
    networks:
      - tripalfa-resilient
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3020/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ============================================
  # CORE SERVICES - Booking Engine Service
  # ============================================

  booking-engine-service:
    build:
      context: .
      dockerfile: services/booking-engine-service/Dockerfile
    container_name: tripalfa-booking-engine-service
    ports:
      - "3021:3021"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3021
      DATABASE_URL: ${NEON_DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_NEON_DATABASE_URL:-${NEON_DATABASE_URL}}
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://tripalfa:tripalfa123@rabbitmq:5672/tripalfa
      JWT_SECRET: ${JWT_SECRET:-change-in-production}
      DUFFEL_API_URL: ${DUFFEL_API_URL:-https://api.duffel.com}
      DUFFEL_API_KEY: ${DUFFEL_API_KEY:-}
      LITEAPI_BASE_URL: ${LITEAPI_BASE_URL:-https://api.liteapi.travel}
      LITEAPI_API_KEY: ${LITEAPI_API_KEY:-}
    networks:
      - tripalfa-resilient
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3021/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ============================================
  # FRONTEND APPLICATIONS
  # ============================================

  b2b-admin:
    build:
      context: .
      dockerfile: apps/b2b-admin/Dockerfile
    container_name: tripalfa-b2b-admin
    ports:
      - "5173:3000"
    environment:
      VITE_API_BASE_URL: http://localhost:3000
    depends_on:
      - api-gateway
    networks:
      - tripalfa-resilient
    restart: unless-stopped

  booking-engine:
    build:
      context: .
      dockerfile: apps/booking-engine/Dockerfile
    container_name: tripalfa-booking-engine
    ports:
      - "5174:3000"
    environment:
      VITE_API_BASE_URL: http://localhost:3000
    depends_on:
      - api-gateway
    networks:
      - tripalfa-resilient
    restart: unless-stopped

volumes:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
  loki_data:
  consul_data:
  postgres_static_data:
  redis_data:

networks:
  tripalfa-resilient:
    driver: bridge
